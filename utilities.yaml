# Utilities Bill Payment Agent Configuration
#
# Credentials are sourced from environment variables — never hardcoded here.
#   {UTILITY_ID_UPPER}_USERNAME  e.g. PGE_USERNAME
#   {UTILITY_ID_UPPER}_PASSWORD  e.g. PGE_PASSWORD
#
# Selector discovery tip: Set HEADLESS=false and run run.py once to inspect
# the live DOM, then fill in the selector values below.

utilities:

  # ---------------------------------------------------------------------------
  # PG&E — Pacific Gas and Electric
  # ---------------------------------------------------------------------------
  - id: pge
    name: "PG&E"
    enabled: false   # Set to true after verifying selectors with headless=False
    login_url: "https://m.pge.com/#login"
    payment_cap: 300.00
    bill_period_format: "%Y_%m"
    selectors:
      username_field:    "#usernameField"
      password_field:    "#passwordField"
      login_button:      "#login-submit"
      post_login_check:  ".dashboard-welcome"
      bill_amount:       ".bill-amount-total"
      due_date:          ".payment-due-date"
      bill_period:       ".billing-period"
      pay_nav_link:      "a[href*='payment']"
      payment_submit:    "#payment-submit-btn"
      confirm_button:    "#confirm-payment-btn"
      success_indicator: ".payment-success-msg"

  # ---------------------------------------------------------------------------
  # Atlas Disposal — Soft-Pak JSP portal (all selectors verified ✓)
  # ---------------------------------------------------------------------------
  - id: atlas
    name: "Atlas Disposal"
    enabled: true
    login_url: "https://secure.soft-pak.com/webpakad/index.jsp"
    payment_cap: 150.00
    bill_period_format: "%Y_%m"

    # Custom step sequences (overrides generic driver defaults)
    steps:
      login:
        - action: navigate
          url: "https://secure.soft-pak.com/webpakad/index.jsp"
        - action: fill
          selector: "#txtSigninEmail"
          credential_key: username
        - action: fill
          selector: "#txtPassword"
          credential_key: password
        - action: click
          selector: "#btnSignin"
        - action: wait_for
          selector: "#divMainContent"
          timeout: 15000

      bill:
        - action: wait_for
          selector: "#billingAmount00"
        - action: extract_text
          selector: "#billingAmount00"
          as: amount
        - action: extract_text
          selector: "#billingDate00"
          as: due_date
        - action: extract_text
          selector: "#billingDescription00"
          as: bill_period

      pay:
        # Opens payment methods modal (saved E-Check pre-selected)
        - action: click
          selector: "#btnMakePayment0"
        - action: wait_for
          selector: "#btnMakePaymentNext"
          timeout: 10000
        - action: click
          selector: "#btnMakePaymentNext"
        # Payment amount dialog — amount pre-filled with balance
        - action: wait_for
          selector: "#btnPaymentAmountNext"
          timeout: 10000
        - action: click
          selector: "#btnPaymentAmountNext"
        # Confirm dialog
        - action: wait_for
          selector: "#btnConfirmPaymentConfirm"
          timeout: 10000
        - action: click
          selector: "#btnConfirmPaymentConfirm"
        # Success
        - action: wait_for
          selector: "#dlgPaymentProcessed"
          timeout: 30000

  # ---------------------------------------------------------------------------
  # Sacramento County Water Agency (all selectors verified ✓)
  # Platform: Angular SPA + Keycloak SSO — uses SacWaterDriver (drivers/sacwater.py)
  # ---------------------------------------------------------------------------
  - id: sacwater
    name: "Sacramento County Water"
    enabled: true
    login_url: "https://myutilities.saccounty.gov"
    payment_cap: 200.00
    bill_period_format: "%Y_%m"
    # No selectors/steps block — SacWaterDriver handles all logic in Python
